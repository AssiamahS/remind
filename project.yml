name: SlyReminders
options:
  bundleIdPrefix: com.djsly
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16.0"

targets:
  SlyReminders:
    type: application
    platform: iOS
    sources:
      - Sources
    info:
      path: Sources/Info.plist
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.djsly.slyreminders
        SWIFT_VERSION: 5.9
        TARGETED_DEVICE_FAMILY: "1,2"
        DEVELOPMENT_TEAM: ""
        CODE_SIGN_IDENTITY: ""
        CODE_SIGNING_REQUIRED: "NO"
        CODE_SIGNING_ALLOWED: "NO"
